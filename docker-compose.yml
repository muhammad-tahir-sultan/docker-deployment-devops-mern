services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:3000"
    container_name: client
    networks:
      - app-network
    depends_on:
      - server
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    container_name: server
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
